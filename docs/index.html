# _The problems_

Our project solves several problems at once.

1. Too much of the Armenian economy is off the books, unregulated, unknown.

2. Corruption is difficult to prove because accounting records are falsified.

3. Because of 1, 2 statistics about the economy are inherently suspect.

4. The Diaspora has a hard time knowing about the situation in Armenia.

	  </script>
	</section>

	<section data-markdown>
	  <script type="text/template">
### _Assumptions for our solution_

1. The government passes a law such that every financial translation over
   3,000,000 AMD must be entered into the public blockchain.

2. The central bank along with other pillars of society keep a copy of
   the public ledger blockchain. Because everyone has a copy there is no way
   to falsifiy the records while also proving verificability of transactions.

	  </script>
	</section>

	<section data-markdown>
	  <script type="text/template">
### _Our solution_

We envision a public website which shows every such transaction over
three million AMD in realtime. In addition, because the the site
has access to the public blockchain data, we can calcuate key economic
metrics like `inflation`, `M1`, `M2` and other `velocity of money` metrics
in real time with graphs for understanding.

Over time we can accumulate enough historical data to provide meaningful
predictive modeling, for example since we know real estate prices, we
can predict what prices will be several months in the future. We expose
this with a chatbot built into the site. The chatbot provides meaningful
information not only for policy makers in real time but especially for
diaspora Armenians who are completely unaware of the local financial
conditions, perhaps they want to purchase land in a hot neighborhoood.

	  </script>
	</section>
